<!-- Página de inicio de sesión -->
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🎓 Universidad Nacional</h1>
        <h2>Sistema de gestión de cursos</h2>
        <form action="/login" method="POST">
            <h3>Ingrese su usuario y contraseña</h3>
            <input type="text" name="correo" placeholder="Correo" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
        </form>

        <hr style="margin: 15px 0;">
        <p style="font-size: 0.9em; color: #666;">¿No tienes cuenta?</p>
        <a href="{{ url_for('main.alumno_registro_form') }}"
           style="display:inline-block; padding:8px 16px; background:#28a745; color:white;
                  border-radius:5px; text-decoration:none; font-size:0.9em;">
            ✏️ Crear cuenta de alumno
        </a>
    </div>
</div>

</body>
</html>
