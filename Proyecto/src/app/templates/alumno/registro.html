<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Gestión de Cursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">🎓 Crear Cuenta de Alumno</h4>
                    <small>Gestión de Cursos de Idiomas</small>
                </div>

                <div class="card-body p-4">

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form action="{{ url_for('main.alumno_registro') }}" method="POST" novalidate>

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="nombre" name="nombre"
                                   value="{{ nombre or '' }}" placeholder="Tu nombre" required>
                        </div>

                        <div class="mb-3">
                            <label for="apellido" class="form-label fw-semibold">Apellido <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="apellido" name="apellido"
                                   value="{{ apellido or '' }}" placeholder="Tu apellido" required>
                        </div>

                        <div class="mb-3">
                            <label for="correo" class="form-label fw-semibold">Correo electrónico <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="correo" name="correo"
                                   value="{{ correo or '' }}" placeholder="correo@ejemplo.com" required>
                        </div>

                        <div class="mb-4">
                            <label for="contrasena" class="form-label fw-semibold">Contraseña <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="contrasena" name="contrasena"
                                   placeholder="Mínimo 6 caracteres" required minlength="6">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                ✅ Registrarse
                            </button>
                        </div>

                    </form>
                </div>

                <div class="card-footer text-center text-muted py-3">
                    ¿Ya tienes cuenta?
                    <a href="{{ url_for('main.index') }}" class="text-decoration-none">Iniciar sesión</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
